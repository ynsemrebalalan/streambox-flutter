workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ynsemrebalalan.iptvai
      # iOS 26.4.1 + ProMotion (iPhone 14/17 Pro Max) siyah ekran fix:
      # 3.32.4 VSyncClient crash'ini yutuyor ama rendering loop
      # baslamiyor (silent black screen). Native tarafta swizzle guard
      # (AppDelegate.swift) + ProMotion opt-out (Info.plist) eklendi.
      # Stable kanal iOS 26 icin en guncel fix'leri de aliyor.
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.ynsemrebalalan.iptvai"

    scripts:
      - name: Flutter version (log)
        script: flutter --version

      - name: Temiz ortam
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          # Flutter major upgrade sonrasi lock catismasi olmasin
          rm -f pubspec.lock

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA (RELEASE MODE — KESIN)
        script: |
          # --release zorunlu, debug/profile UPLOAD EDILMEMELI
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Build mode dogrulama
        script: |
          # IPA icindeki Info.plist'i extract edip DTCompiler + release kontrolu yap
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          unzip -o "$IPA_PATH" -d /tmp/ipa_verify > /dev/null
          APP_PATH=$(find /tmp/ipa_verify/Payload -name "*.app" -type d | head -1)
          # Release build'de Flutter.framework icinde FlutterDebug.xcconfig olmaz
          if [ -f "$APP_PATH/Frameworks/App.framework/flutter_assets/vm_snapshot_data" ]; then
            echo "❌ DEBUG BUILD DETECTED — vm_snapshot_data var (sadece debug'da olur)!"
            exit 1
          fi
          echo "✅ Release build dogrulandi"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
