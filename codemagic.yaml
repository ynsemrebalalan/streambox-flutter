workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.41.5
      xcode: latest
      cocoapods: default

      # Manuel imzalama: Codemagic'e onceden yuklenmis dagitim sertifikasi +
      # app_store provisioning profili (bundle id ile eslesir). UI "Default
      # Workflow" da ayni kimlik bilgilerini kullaniyor — kanitli calisan
      # imzalama. ios_signing varken Codemagic profilleri otomatik fetch eder.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ynsemrebalalan.iptvai

    scripts:
      # 1) Swift Package Manager'i KAPAT — her seyden ONCE. google_mobile_ads
      #    (CocoaPods-only) ile webview_flutter_wkwebview (SPM destekli, onun
      #    transitive bagimliligi) cakisip pod install'u patlatiyor. SPM
      #    kapaliyken ikisi de CocoaPods kullanir (Flutter'in resmi cozumu).
      - name: Swift Package Manager kapat
        script: |
          flutter config --no-enable-swift-package-manager
          flutter config --list | grep -i "swift-package-manager" || true

      # 2) Imzalama profillerini Xcode projesine uygula + export_options.plist
      #    olustur (ios_signing sayesinde profiller zaten indirildi).
      - name: Code signing — profilleri uygula
        script: xcode-project use-profiles

      # 3) IPA uret. "flutter build ipa" pub get + pod install'i kendi yapar;
      #    SPM kapali oldugu icin pod install temiz gecer.
      - name: Build IPA (release)
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # ── Android — Play Store / Internal testing AAB build ────────────────────
  # Tetik: Codemagic UI -> Applications -> streambox-flutter -> Start new build
  #        -> android-release / master
  #
  # Cikti: signed AAB (Play Console upload icin) + signed APK (yan yukleme).
  # RC + GROQ key'leri --dart-define ile gomulur.
  #
  # Onkosul: Codemagic UI -> Application -> Code signing identities (Android):
  #   - Reference name: streambox_keystore
  #   - keystore: streambox.jks (kullanici upload eder)
  #   - keystore password / key alias / key password
  #
  # Eger keystore yoksa Codemagic'te Android signing bolumune dosya yukle,
  # alttaki "android_signing" referansi otomatik baglanir.
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.41.5
      groovy: default

      android_signing:
        - streambox_keystore

      vars:
        PACKAGE_NAME: "com.ynsemrebalalan.iptvai"
      # Secret variables (Codemagic UI):
      #   GROQ_PROXY_URL, GROQ_PROXY_SECRET, REVENUECAT_ANDROID_KEY, REVENUECAT_IOS_KEY

    scripts:
      - name: Flutter version
        script: flutter --version

      # pubspec.lock silinmiyor — reproducible build (bkz. ios-release notu).
      - name: Temiz ortam
        script: flutter clean

      - name: Flutter pub get
        script: flutter pub get

      - name: Auto-increment versionCode
        script: |
          PUBSPEC_BUILD=$(grep "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          BUILD_NUMBER=$PUBSPEC_BUILD
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          echo "Building versionCode=$BUILD_NUMBER"

      - name: Build AAB (release, signed)
        script: |
          flutter build appbundle \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

      - name: Build APK (release, signed) — yan yukleme/test
        script: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - vibedaveddeva@gmail.com
        notify:
          success: true
          failure: true
