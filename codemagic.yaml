workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    # App Store Connect API key entegrasyonu — Codemagic UI'daki integration
    # adi BUYUK/KUCUK harf duyarli olarak buraya ESLESMELI.
    # UI: Teams -> Integrations -> App Store Connect -> "Codemagic"
    integrations:
      app_store_connect: Codemagic

    environment:
      # iOS 26 ProMotion siyah ekran KESIN cozumu AppDelegate.swift'te
      # explicit FlutterEngine prewarm pattern. Flutter 3.41.5 = Subat 2026
      # son stable; "stable" dinamik olmasin, reproducible build icin pin.
      flutter: 3.41.5
      xcode: latest
      cocoapods: default

      # NOT: environment.ios_signing BLOGU KASTEN YOK.
      # Declarative ios_signing manuel signing icindir (onceden upload
      # edilmis profile arar). Bizim akis App Store Connect API ile
      # otomatik fetch + create. Ikisi yan yana olursa Codemagic once
      # manuel arar, "No matching profiles found" hatasi verir.
      # Ref: github.com/orgs/codemagic-ci-cd/discussions/3362

      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.ynsemrebalalan.iptvai"
      # AI altyazı (Whisper/Groq) — Codemagic UI'da Secret variable olarak ekle:
      # Application → Environment variables:
      #   GROQ_PROXY_URL    = https://iptvaiplayer.com.tr/groq-proxy.php   (Secure: ✅)
      #   GROQ_PROXY_SECRET = <gerçek secret>                              (Secure: ✅)
      #
      # RevenueCat IAP (Adim 22) — Codemagic UI'da Secret variable:
      #   REVENUECAT_IOS_KEY     = <RC iOS public SDK key>                 (Secure: ✅)
      #   REVENUECAT_ANDROID_KEY = <RC Android public SDK key>             (Secure: ✅)
      # RC dashboard -> Project -> Apps -> "Public app-specific API keys".
      #
      # Build IPA scripti tum --dart-define'lari ipa'ya gomer; APK icinde
      # static String constant'lara donusur, kullaniciya gorunmez.

    scripts:
      - name: Flutter version (log)
        script: flutter --version

      # Swift Package Manager'i kapat. google_mobile_ads hala CocoaPods-only,
      # webview_flutter_wkwebview SPM'e gecti; Flutter 3.41'de SPM varsayilan
      # ACIK oldugu icin ikisi yan yana olunca "dependency conflict" -> pod
      # install fail. Bu, Flutter'in hata mesajinda onerdigi resmi cozum.
      # pubspec.lock CI'da silindigi icin webview yeni (SPM'li) surume cikinca
      # tetiklendi. google_mobile_ads SPM destegi gelince bu adim kaldirilabilir.
      - name: Swift Package Manager kapat
        script: flutter config --no-enable-swift-package-manager

      - name: Temiz ortam
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          rm -f pubspec.lock

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      # Code signing — App Store Connect API ile tam otomatik:
      # 1) keychain initialize: temiz build keychain
      # 2) fetch-signing-files --create: profile yoksa yeni olustur
      # 3) keychain add-certificates: cert'i keychain'e ekle
      # 4) xcode-project use-profiles: Xcode project signing settings'i
      #    + ExportOptions.plist'i otomatik gunceller
      - name: Code signing setup
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type=IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # Auto-increment build number — App Store Connect'teki son TestFlight
      # build no'su +1; pubspec'teki +N max ile. "Duplicate bundle version"
      # hatasini onler.
      #
      # NOT: -ge (greater-or-equal) sart. -gt iken LATEST_TF == PUBSPEC olunca
      # pubspec'i kullaniyordu ve ASC ayni numarayi tekrar reddediyordu
      # (ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE).
      - name: Auto-increment build number
        script: |
          set +e
          LATEST_TF=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          set -e
          PUBSPEC_BUILD=$(grep "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          if [ "$LATEST_TF" -ge "$PUBSPEC_BUILD" ]; then
            NEW_BUILD=$((LATEST_TF + 1))
          else
            NEW_BUILD=$PUBSPEC_BUILD
          fi
          echo "Latest TestFlight: $LATEST_TF, pubspec: $PUBSPEC_BUILD, building: $NEW_BUILD"
          echo "BUILD_NUMBER=$NEW_BUILD" >> $CM_ENV

      # Build IPA — release zorunlu, debug/profile UPLOAD EDILMEZ.
      # NOT: --export-options-plist parametresi KASTEN YOK.
      # xcode-project use-profiles ExportOptions.plist'i kendi olusturur/
      # gunceller; harici plist verirsek signing config'i ezeriz.
      - name: Build iOS IPA (release)
        script: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

      - name: Release build dogrulama
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          unzip -o "$IPA_PATH" -d /tmp/ipa_verify > /dev/null
          APP_PATH=$(find /tmp/ipa_verify/Payload -name "*.app" -type d | head -1)
          # vm_snapshot_data sadece debug build'lerde olur — release ise yok
          if [ -f "$APP_PATH/Frameworks/App.framework/flutter_assets/vm_snapshot_data" ]; then
            echo "❌ DEBUG BUILD DETECTED — vm_snapshot_data var (sadece debug'da)!"
            exit 1
          fi
          echo "✅ Release build dogrulandi"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ── Android — Play Store / Internal testing AAB build ────────────────────
  # Tetik: Codemagic UI -> Applications -> streambox-flutter -> Start new build
  #        -> android-release / master
  #
  # Cikti: signed AAB (Play Console upload icin) + signed APK (yan yukleme).
  # RC + GROQ key'leri --dart-define ile gomulur.
  #
  # Onkosul: Codemagic UI -> Application -> Code signing identities (Android):
  #   - Reference name: streambox_keystore
  #   - keystore: streambox.jks (kullanici upload eder)
  #   - keystore password / key alias / key password
  #
  # Eger keystore yoksa Codemagic'te Android signing bolumune dosya yukle,
  # alttaki "android_signing" referansi otomatik baglanir.
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.41.5
      groovy: default

      android_signing:
        - streambox_keystore

      vars:
        PACKAGE_NAME: "com.ynsemrebalalan.iptvai"
      # Secret variables (Codemagic UI):
      #   GROQ_PROXY_URL, GROQ_PROXY_SECRET, REVENUECAT_ANDROID_KEY, REVENUECAT_IOS_KEY

    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Temiz ortam
        script: |
          flutter clean
          rm -f pubspec.lock

      - name: Flutter pub get
        script: flutter pub get

      - name: Auto-increment versionCode
        script: |
          PUBSPEC_BUILD=$(grep "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          BUILD_NUMBER=$PUBSPEC_BUILD
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          echo "Building versionCode=$BUILD_NUMBER"

      - name: Build AAB (release, signed)
        script: |
          flutter build appbundle \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

      - name: Build APK (release, signed) — yan yukleme/test
        script: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - vibedaveddeva@gmail.com
        notify:
          success: true
          failure: true
