workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    # App Store Connect API entegrasyonu. Codemagic UI'da:
    #   Teams/Settings -> Integrations -> App Store Connect
    # Asagidaki ad, oradaki integration adiyla BIREBIR (buyuk/kucuk harf
    # dahil) eslesmeli. Eslesmezse "integration not found" hatasi alinir.
    integrations:
      app_store_connect: Codemagic

    environment:
      # CERTIFICATE_PRIVATE_KEY ortam degiskeni "signing" grubunda olmali
      # (Codemagic UI -> Environment variables -> group: signing, Secure).
      groups:
        - signing
      flutter: 3.41.5
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.ynsemrebalalan.iptvai"

    scripts:
      # 1) Swift Package Manager'i KAPAT — her seyden ONCE. google_mobile_ads
      #    (CocoaPods-only) ile webview_flutter_wkwebview (SPM destekli) cakisip
      #    pod install'u patlatiyor. SPM kapaliyken ikisi de CocoaPods kullanir.
      - name: Swift Package Manager kapat
        script: |
          flutter config --no-enable-swift-package-manager
          flutter config --list | grep -i "swift-package-manager" || true

      - name: Flutter pub get
        script: flutter pub get

      # 2) Imzalama — App Store Connect API ile profil/sertifika fetch (yoksa
      #    --create ile olustur), keychain'e ekle, Xcode projesine uygula.
      #    integrations bloku ASC kimlik bilgilerini env'e otomatik enjekte eder.
      - name: Code signing setup
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type=IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # 3) Build no'yu otomatik artir. ASC'deki son TestFlight build'inden +1,
      #    pubspec'tekiyle max al. "Duplicate bundle version" hatasini onler.
      #    integrations.app_store_connect kimlik bilgilerini env'e enjekte eder.
      - name: Auto-increment build number
        script: |
          set +e
          LATEST_TF=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          set -e
          PUBSPEC_BUILD=$(grep "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          if [ "$LATEST_TF" -ge "$PUBSPEC_BUILD" ]; then
            NEW_BUILD=$((LATEST_TF + 1))
          else
            NEW_BUILD=$PUBSPEC_BUILD
          fi
          echo "Latest TestFlight: $LATEST_TF, pubspec: $PUBSPEC_BUILD, building: $NEW_BUILD"
          echo "BUILD_NUMBER=$NEW_BUILD" >> $CM_ENV

      # 4) IPA uret. "flutter build ipa" pub get + pod install'i kendi de yapar;
      #    SPM kapali oldugu icin pod install temiz gecer.
      - name: Build iOS IPA (release)
        script: flutter build ipa --release --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    # TestFlight'a otomatik yukleme. Ayni "Codemagic" ASC API entegrasyonu
    # kullanilir (integrations bloku). submit_to_app_store: false — App Store
    # gonderimi manuel (review'a yollarken karar).
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ── Android — Play Store / Internal testing AAB build ────────────────────
  # Tetik: Codemagic UI -> Applications -> streambox-flutter -> Start new build
  #        -> android-release / master
  #
  # Onkosul: Codemagic UI -> Application -> Code signing identities (Android):
  #   - Reference name: streambox_keystore
  #   - keystore: streambox.jks (kullanici upload eder)
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.41.5

      android_signing:
        - streambox_keystore

      vars:
        PACKAGE_NAME: "com.ynsemrebalalan.iptvai"
      # Secret variables (Codemagic UI):
      #   GROQ_PROXY_URL, GROQ_PROXY_SECRET, REVENUECAT_ANDROID_KEY, REVENUECAT_IOS_KEY

    scripts:
      - name: Flutter version
        script: flutter --version

      # pubspec.lock silinmiyor — reproducible build.
      - name: Temiz ortam
        script: flutter clean

      - name: Flutter pub get
        script: flutter pub get

      - name: Auto-increment versionCode
        script: |
          PUBSPEC_BUILD=$(grep "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          BUILD_NUMBER=$PUBSPEC_BUILD
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          echo "Building versionCode=$BUILD_NUMBER"

      - name: Build AAB (release, signed)
        script: |
          flutter build appbundle \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

      - name: Build APK (release, signed) — yan yukleme/test
        script: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=GROQ_PROXY_URL=$GROQ_PROXY_URL \
            --dart-define=GROQ_PROXY_SECRET=$GROQ_PROXY_SECRET \
            --dart-define=REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - vibedaveddeva@gmail.com
        notify:
          success: true
          failure: true
